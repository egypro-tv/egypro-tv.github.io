<style>
/* الخلفية الليلية */
body {
    margin: 0;
    min-height: 100vh;
    font-family: Arial, Helvetica, sans-serif;

    display: flex;
    justify-content: center;
    align-items: center;

    background:
        radial-gradient(circle at 70% 20%, #000000 0%, #000000 40%, #000000 100%);
}

/* الصندوق */
.card {
    width: 620px;
    padding: 50px;
    background: #111;
    border: 2px solid #2b2b2b;
    border-radius: 20px;
    box-shadow: 0 0 35px rgba(255,255,255,0.05);
    text-align: center;
    color: white;
    transition: 0.3s;
    position: relative;
}

.card:hover {
    border-color: #00ffd5;
    box-shadow: 0 0 35px rgba(0,255,213,0.4);
}

h1 {
    margin-top: 0;
    color: #00ffd5;
}

.buttons {
    display: flex;
    justify-content: center;
    margin-top: 30px;
}

button {
    padding: 14px 28px;
    background: transparent;
    color: #00ffd5;
    border: 2px solid #00ffd5;
    border-radius: 8px;
    cursor: pointer;
    font-size: 17px;
    transition: 0.3s;
}

button:hover {
    background: #00ffd5;
    color: black;
}

/* رسالة الاشعار فوق الكرت */
#toast {
    position: absolute;
    top: -70px;
    left: 50%;
    transform: translateX(-50%);
    background: #00ffd5;
